name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Run ESLint
        working-directory: ./backend
        run: npx eslint src/

  build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      - name: Smoke test - server starts
        working-directory: ./backend
        run: |
          timeout 5 node src/index.js &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
          kill %1 2>/dev/null || true
        env:
          GROQ_API_KEY: test_key
          EMAILJS_SERVICE_ID: test
          EMAILJS_TEMPLATE_ID: test
          EMAILJS_PUBLIC_KEY: test
          EMAILJS_PRIVATE_KEY: test
          FRONTEND_URL: http://localhost:3000
          PORT: 8000

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t rabbitt-backend ./backend
      - name: Build frontend image
        run: docker build -t rabbitt-frontend --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000 ./frontend
      - name: Verify backend image
        run: docker run -d --name backend-test -p 8000:8000 -e GROQ_API_KEY=test -e EMAILJS_SERVICE_ID=test -e EMAILJS_TEMPLATE_ID=test -e EMAILJS_PUBLIC_KEY=test -e EMAILJS_PRIVATE_KEY=test -e FRONTEND_URL=http://localhost:3000 -e PORT=8000 rabbitt-backend && sleep 3 && curl -f http://localhost:8000/health && docker stop backend-test
